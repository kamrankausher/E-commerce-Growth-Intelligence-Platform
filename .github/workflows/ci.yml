name: CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t ecommerce-growth-intelligence:latest .

      - name: Mock Docker Hub push step
        run: echo "Optional: docker push <dockerhub-username>/ecommerce-growth-intelligence:latest"
